version: '3.8'

services:
  # Python AI Service (FastAPI)
  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-crimegraph_password}
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}
    networks:
      - crimegraph-net
    restart: always

  # Node.js Backend (Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=${DATABASE_URL}
      - AI_SERVICE_URL=http://ai-service:8000/process_fir
      - GROQ_KEY_1=${GROQ_KEY_1}
      - GROQ_KEY_2=${GROQ_KEY_2}
      - GROQ_KEY_3=${GROQ_KEY_3}
      - GROQ_KEY_4=${GROQ_KEY_4}
      - GROQ_KEY_5=${GROQ_KEY_5}
      - GROQ_KEY_6=${GROQ_KEY_6}
      - GROQ_KEY_7=${GROQ_KEY_7}
      - GROQ_KEY_8=${GROQ_KEY_8}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}
    depends_on:
      - ai-service
    networks:
      - crimegraph-net
    restart: always

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5001/api}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - crimegraph-net
    restart: always

  # Neo4j Graph Database
  # Note: If using Coolify's managed Neo4j, you can remove this
  neo4j:
    image: neo4j:5.12
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-crimegraph_password}
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data
    networks:
      - crimegraph-net
    restart: always

networks:
  crimegraph-net:
    driver: bridge

volumes:
  neo4j_data:
