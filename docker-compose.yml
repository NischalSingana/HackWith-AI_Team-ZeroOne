services:
  # Python AI Service (FastAPI)
  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-crimegraph_password}
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}
    networks:
      - crimegraph-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Node.js Backend (Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - AI_SERVICE_URL=http://ai-service:8000/process_fir
      - CORS_ORIGINS=${CORS_ORIGINS:-https://crimegraph.zeroonedevs.in,http://localhost:3000,http://127.0.0.1:3000}
      - GROQ_KEY_1=${GROQ_KEY_1}
      - GROQ_KEY_2=${GROQ_KEY_2}
      - GROQ_KEY_3=${GROQ_KEY_3}
      - GROQ_KEY_4=${GROQ_KEY_4}
      - GROQ_KEY_5=${GROQ_KEY_5}
      - GROQ_KEY_6=${GROQ_KEY_6}
      - GROQ_KEY_7=${GROQ_KEY_7}
      - GROQ_KEY_8=${GROQ_KEY_8}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - crimegraph-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3000,'127.0.0.1',()=>{s.end();process.exit(0);});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),5000);"]
      interval: 20s
      timeout: 8s
      retries: 8
      start_period: 90s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://crimegraphapi.zeroonedevs.in/api}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://crimegraphapi.zeroonedevs.in/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crimegraph-net
    restart: unless-stopped

  # Neo4j Graph Database
  # Note: If using Coolify's managed Neo4j, you can remove this
  neo4j:
    image: neo4j:5.12
    profiles: ["local-neo4j"]
    expose:
      - "7474"
      - "7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-crimegraph_password}
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data
    networks:
      - crimegraph-net
    restart: unless-stopped

networks:
  crimegraph-net:
    driver: bridge

volumes:
  neo4j_data:
